name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (type-check)
        run: |
          pnpm --filter @threadlens/shared-contracts build
          pnpm --filter @threadlens/api lint
          pnpm --filter @threadlens/tui lint
          pnpm --filter @threadlens/web lint

      - name: Build API
        run: pnpm --filter @threadlens/api build

      - name: Build Web
        run: pnpm --filter @threadlens/web build

      - name: Build TUI
        run: pnpm --filter @threadlens/tui build

      - name: Test API
        run: pnpm --filter @threadlens/api test

      - name: Test TUI
        run: pnpm --filter @threadlens/tui test

      - name: Test Web (unit)
        run: pnpm --filter @threadlens/web test

      - name: Install Playwright Chromium
        run: pnpm --filter @threadlens/web exec playwright install --with-deps chromium

      - name: Test Web E2E (providers + token + perf)
        run: pnpm --filter @threadlens/web test:e2e
