name: CI

on:
  push:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: OSS hygiene
        run: pnpm oss:hygiene

      - name: Public export verify
        if: matrix.node-version == 20
        run: pnpm public:verify

      - name: Lint (type-check)
        run: |
          pnpm --filter @provider-surface/shared-contracts build
          pnpm --filter @provider-surface/api lint
          pnpm --filter @provider-surface/web lint

      - name: Build API
        run: pnpm --filter @provider-surface/api build

      - name: Build Web
        run: pnpm --filter @provider-surface/web build

      - name: Test API
        run: pnpm --filter @provider-surface/api test

      - name: Test Web (unit)
        run: pnpm --filter @provider-surface/web test

      - name: Install Playwright Chromium
        if: matrix.node-version == 20
        run: pnpm --filter @provider-surface/web exec playwright install --with-deps chromium

      - name: Test Web E2E (providers + token + perf)
        if: matrix.node-version == 20
        run: pnpm --filter @provider-surface/web test:e2e

      - name: Test Web E2E Live (real Python+TS backend)
        if: matrix.node-version == 20
        run: pnpm web:e2e:live

      - name: Contract parity + forensics/perf smoke (strict)
        if: matrix.node-version == 20
        run: |
          set -euo pipefail
          python3 server.py >/tmp/ci-python.log 2>&1 &
          PY_PID=$!
          pnpm --filter @provider-surface/api dev >/tmp/ci-api-ts.log 2>&1 &
          TS_PID=$!
          trap 'kill $TS_PID $PY_PID >/dev/null 2>&1 || true' EXIT
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8787/api/runtime-health >/dev/null 2>&1 \
              && curl -fsS http://127.0.0.1:8788/api/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          REQUIRE_PARITY=1 pnpm --filter @provider-surface/tests-api-contract test
          pnpm forensics:smoke
          pnpm perf:smoke:strict
          pnpm smoke:summary

      - name: Upload perf smoke report
        if: matrix.node-version == 20 && always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-report-node20
          path: .run/perf/perf-smoke-*.*
          if-no-files-found: ignore

      - name: Upload forensics smoke report
        if: matrix.node-version == 20 && always()
        uses: actions/upload-artifact@v4
        with:
          name: forensics-smoke-report-node20
          path: .run/forensics/forensics-smoke-*.*
          if-no-files-found: ignore

      - name: Upload smoke summary report
        if: matrix.node-version == 20 && always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-summary-report-node20
          path: .run/smoke/smoke-summary-*.*
          if-no-files-found: ignore

      - name: Upload web live e2e smoke report
        if: matrix.node-version == 20 && always()
        uses: actions/upload-artifact@v4
        with:
          name: web-live-e2e-report-node20
          path: |
            .run/e2e-live/web-live-e2e-*.*
            .run/e2e-live/test-results-*
          if-no-files-found: ignore
