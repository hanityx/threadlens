name: Desktop Artifacts

on:
  pull_request:
    paths:
      - "apps/desktop-electron/**"
      - "apps/api-ts/**"
      - "apps/web/**"
      - "packages/shared-contracts/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/desktop-artifacts.yml"
      - ".github/workflows/desktop-release.yml"

jobs:
  desktop-build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install xvfb
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build desktop artifacts
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            macos-latest)
              pnpm package:desktop
              ;;
            windows-latest)
              pnpm package:desktop:win
              ;;
            ubuntu-latest)
              pnpm package:desktop:linux
              ;;
          esac

      - name: Smoke packaged desktop
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @threadlens/desktop-electron smoke:packaged

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: threadlens-desktop-${{ matrix.os }}
          path: |
            apps/desktop-electron/dist/**/*.zip
            apps/desktop-electron/dist/**/*.exe
            apps/desktop-electron/dist/**/*.AppImage
            apps/desktop-electron/dist/**/*.app
          if-no-files-found: ignore
