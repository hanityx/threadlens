name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.2.0
        required: true
        type: string
      make_latest:
        description: Mark this release as the latest release
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: threadlens-desktop-macos
            command: pnpm package:desktop
          - os: windows-latest
            artifact_name: threadlens-desktop-windows
            command: pnpm package:desktop:win
          - os: ubuntu-latest
            artifact_name: threadlens-desktop-linux
            command: pnpm package:desktop:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.12.0

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.2

      - name: Disable accidental macOS auto-signing when no signing identity is configured
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
        run: |
          if [ -n "${CSC_NAME}" ]; then
            exit 0
          fi

          if [ -z "${CSC_LINK}" ] || [ -z "${CSC_KEY_PASSWORD}" ]; then
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
          fi

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install xvfb
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build desktop release artifacts
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
        run: ${{ matrix.command }}

      - name: Smoke packaged desktop
        if: matrix.os == 'ubuntu-latest'
        run: pnpm --filter @threadlens/desktop-electron smoke:packaged

      - name: Upload desktop release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop-electron/dist/**/*.zip
            apps/desktop-electron/dist/**/*.exe
            apps/desktop-electron/dist/**/*.AppImage
            apps/desktop-electron/dist/**/*.app
          if-no-files-found: ignore

  publish-release:
    name: Publish GitHub release
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download desktop artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Collect release assets
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_NAME: ${{ secrets.CSC_NAME }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_KEYCHAIN: ${{ secrets.APPLE_KEYCHAIN }}
          APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"

          mkdir -p release-assets
          find release-artifacts -type f -name '*.zip' -exec cp {} release-assets/ \;
          find release-artifacts -type f -name '*.AppImage' -exec cp {} release-assets/ \;

          WINDOWS_PORTABLE="$(find release-artifacts -type f -name '*.exe' \
            ! -name 'ThreadLens.exe' \
            ! -name 'elevate.exe' \
            | head -n 1)"
          if [ -n "${WINDOWS_PORTABLE}" ]; then
            cp "${WINDOWS_PORTABLE}" "release-assets/ThreadLens.${VERSION}.exe"
          fi

          if ! find release-assets -maxdepth 1 -type f | grep -q .; then
            echo "No release assets were collected."
            exit 1
          fi

          (
            cd release-assets
            shasum -a 256 * > "ThreadLens-${VERSION}-SHA256SUMS.txt"
          )
          node tools/generate-desktop-trust-notes.mjs --version "${VERSION}" --out release-assets

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag }}"
          TITLE="ThreadLens ${TAG}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
            exit 0
          fi

          if [ "${{ github.event.inputs.make_latest }}" = "true" ]; then
            gh release create "$TAG" release-assets/* --title "$TITLE" --generate-notes --latest
          else
            gh release create "$TAG" release-assets/* --title "$TITLE" --generate-notes --latest=false
          fi
