name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v0.2.0
        required: true
        type: string
      make_latest:
        description: Mark this release as the latest release
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: threadlens-desktop-macos
            command: pnpm package:desktop
          - os: windows-latest
            artifact_name: threadlens-desktop-windows
            command: pnpm package:desktop:win
          - os: ubuntu-latest
            artifact_name: threadlens-desktop-linux
            command: pnpm package:desktop:linux
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 10.4.1

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build desktop release artifacts
        run: ${{ matrix.command }}

      - name: Upload desktop release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop-electron/dist/**/*.zip
            apps/desktop-electron/dist/**/*.exe
            apps/desktop-electron/dist/**/*.AppImage
            apps/desktop-electron/dist/**/*.app
          if-no-files-found: ignore

  publish-release:
    name: Publish GitHub release
    needs: build-desktop
    runs-on: ubuntu-latest
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag }}"
          VERSION="${TAG#v}"

          mkdir -p release-assets
          find release-artifacts -type f \( -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' \) -exec cp {} release-assets/ \;

          if ! find release-assets -maxdepth 1 -type f | grep -q .; then
            echo "No release assets were collected."
            exit 1
          fi

          (
            cd release-assets
            shasum -a 256 * > "ThreadLens-${VERSION}-SHA256SUMS.txt"
          )

          cat > "release-assets/ThreadLens-${VERSION}-unsigned-install-notes.md" <<EOF
          # Unsigned desktop build notes

          These builds are unsigned.

          - macOS: open the app from Finder with Control-click -> Open on the first launch.
          - Windows: use More info -> Run anyway if SmartScreen appears.
          - Linux: run \`chmod +x ThreadLens-*.AppImage\` before launching the AppImage.
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ github.event.inputs.tag }}"
          TITLE="ThreadLens ${TAG}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" release-assets/* --clobber
            exit 0
          fi

          if [ "${{ github.event.inputs.make_latest }}" = "true" ]; then
            gh release create "$TAG" release-assets/* --title "$TITLE" --generate-notes --latest
          else
            gh release create "$TAG" release-assets/* --title "$TITLE" --generate-notes --latest=false
          fi
