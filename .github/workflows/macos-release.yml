name: macOS Desktop Release

on:
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: pnpm install

      - name: Run tests
        run: |
          pnpm --filter @codex/api-ts test
          pnpm --filter @codex/tests-api-contract test || true

      - name: Build desktop bundle
        run: pnpm build:desktop

      - name: Sign and notarize (optional)
        if: ${{ secrets.APPLE_SIGN_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_PASSWORD != '' }}
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: pnpm release:macos:sign

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-legacy-layer-app
          path: apps/desktop-tauri/target/release/bundle/macos/Codex Mission Control.app

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-legacy-layer-dmg
          path: apps/desktop-tauri/target/release/bundle/dmg/*.dmg
