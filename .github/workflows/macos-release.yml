name: macOS Desktop Release

on:
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v5
        with:
          version: 10.4.1

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build desktop zip
        run: pnpm package:desktop

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: threadlens-app
          path: apps/desktop-electron/dist/mac-arm64/ThreadLens.app

      - name: Upload desktop zip artifacts
        uses: actions/upload-artifact@v4
        with:
          name: threadlens-zips
          path: apps/desktop-electron/dist/*.zip
          if-no-files-found: ignore
