name: macOS Desktop Release

on:
  workflow_dispatch:

jobs:
  build-desktop:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: pnpm install

      - name: Run tests
        run: |
          set -euo pipefail
          python3 server.py >/tmp/release-python.log 2>&1 &
          PY_PID=$!
          pnpm --filter @codex/api-ts dev >/tmp/release-api-ts.log 2>&1 &
          TS_PID=$!
          trap 'kill $TS_PID $PY_PID >/dev/null 2>&1 || true' EXIT
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:8787/api/runtime-health >/dev/null 2>&1 \
              && curl -fsS http://127.0.0.1:8788/api/healthz >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          pnpm --filter @codex/api-ts test
          pnpm --filter @codex/web test
          pnpm --filter @codex/web exec playwright install chromium
          pnpm --filter @codex/web test:e2e
          pnpm web:e2e:live
          REQUIRE_PARITY=1 pnpm --filter @codex/tests-api-contract test
          pnpm forensics:smoke
          pnpm perf:smoke:strict
          pnpm smoke:summary

      - name: Build desktop bundle
        run: pnpm build:desktop

      - name: Sign and notarize (optional)
        if: ${{ secrets.APPLE_SIGN_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_PASSWORD != '' }}
        env:
          APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: pnpm release:macos:sign

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-legacy-layer-app
          path: apps/desktop-tauri/target/release/bundle/macos/Codex Mission Control.app

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: codex-legacy-layer-dmg
          path: apps/desktop-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload perf smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-report-macos-release
          path: .run/perf/perf-smoke-*.*
          if-no-files-found: ignore

      - name: Upload forensics smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forensics-smoke-report-macos-release
          path: .run/forensics/forensics-smoke-*.*
          if-no-files-found: ignore

      - name: Upload smoke summary report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-summary-report-macos-release
          path: .run/smoke/smoke-summary-*.*
          if-no-files-found: ignore

      - name: Upload web live e2e smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-live-e2e-report-macos-release
          path: |
            .run/e2e-live/web-live-e2e-*.*
            .run/e2e-live/test-results-*
          if-no-files-found: ignore
