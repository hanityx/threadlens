<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="ThreadLens">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#191c1f" />
      <stop offset="50%" stop-color="#0b0c0d" />
      <stop offset="100%" stop-color="#050607" />
    </linearGradient>
    <linearGradient id="lens-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a3036" opacity="0.4" />
      <stop offset="100%" stop-color="#0b0c0d" opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Dark Squircle Background for macOS & Web -->
  <rect width="512" height="512" rx="116" fill="url(#bg-grad)" />

  <!-- Subtle inner lens body -->
  <circle cx="256" cy="256" r="200" fill="url(#lens-grad)" />

  <!-- Concentric lens rings (Quartz Mono style) -->
  <g fill="none" stroke-linecap="round">
    <circle cx="256" cy="256" r="200" stroke="#b5c2ca" stroke-width="4" opacity="0.3" />
    <circle cx="256" cy="256" r="150" stroke="#b5c2ca" stroke-width="6" opacity="0.5" />
    <circle cx="256" cy="256" r="100" stroke="#b5c2ca" stroke-width="8" opacity="0.7" />
    <circle cx="256" cy="256" r="50"  stroke="#b5c2ca" stroke-width="12" opacity="0.9" />
  </g>
</svg>
